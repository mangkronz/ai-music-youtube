name: Daily AI Music Automation

# Trigger: Every day at 20:00 (8 PM) Thailand time
on:
  schedule:
    # 20:00 Bangkok = 13:00 UTC (Bangkok is UTC+7)
    - cron: '0 13 * * *'
  
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install system dependencies
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      # Step 4: Install Python packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai google-auth-oauthlib google-auth-httplib2 google-api-python-client
      
      # Step 5: Run automation script
      - name: Run AI Music Automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: python youtube_automation.py
      
      # Step 6: Upload output artifacts
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-output
          path: output/
          retention-days: 30
      
      # Step 7: Send notification (optional)
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Daily AI Music Automation Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🎵 AI Music YouTube Automation\n*Status:* Complete\n*Time:* ${{ job.status }}"
                  }
                }
              ]
            }
